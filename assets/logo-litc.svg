<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">LitC Adrian Broda logo</title>
  <desc id="desc">Stylized LITC lettering with green orbit accents and Adrian Broda subtitle.</desc>
  <defs>
    <linearGradient id="blueMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f7fb"/>
      <stop offset="35%" stop-color="#c5d8e7"/>
      <stop offset="65%" stop-color="#7fa9c6"/>
      <stop offset="100%" stop-color="#dce9f3"/>
    </linearGradient>
    <linearGradient id="greenCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c5ec54"/>
      <stop offset="55%" stop-color="#5bbd2f"/>
      <stop offset="100%" stop-color="#1b7f2a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a6f96"/>
      <stop offset="100%" stop-color="#1e4f78"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0e2841" flood-opacity="0.22"/>
    </filter>
    <style>
      .main-text {
        font-family: "Arial Black", "Segoe UI", Arial, sans-serif;
        font-weight: 900;
        font-style: italic;
        letter-spacing: 3px;
      }
      .stroke {
        stroke: #2d3f52;
        stroke-width: 7;
        paint-order: stroke fill;
      }
    </style>
  </defs>

  <g opacity="0.55" stroke="#8eba4e" stroke-width="5" fill="none">
    <ellipse cx="575" cy="225" rx="360" ry="130"/>
    <ellipse cx="575" cy="225" rx="360" ry="130" transform="rotate(28 575 225)"/>
    <ellipse cx="575" cy="225" rx="360" ry="130" transform="rotate(-28 575 225)"/>
  </g>
  <g fill="#9ed54b" filter="url(#softShadow)">
    <circle cx="350" cy="132" r="28"/>
    <circle cx="815" cy="122" r="24"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="205" y="340" class="main-text stroke" font-size="270" fill="url(#blueMetal)">Li</text>
    <text x="505" y="340" class="main-text stroke" font-size="270" fill="url(#greenCore)">t</text>
    <text x="630" y="340" class="main-text stroke" font-size="270" fill="url(#blueMetal)">C</text>
  </g>

  <text x="600" y="470" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="9" fill="#203c5e">
    LOGISTICS
  </text>

  <g stroke="#5e91b6" stroke-width="5" opacity="0.8">
    <line x1="190" y1="560" x2="405" y2="560"/>
    <line x1="795" y1="560" x2="1010" y2="560"/>
  </g>
  <text x="600" y="580" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="700" letter-spacing="5" fill="url(#nameGrad)">
    ADRIAN BRODA
  </text>
</svg>
