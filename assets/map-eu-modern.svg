      opacity="0.95"
    />
    <path
      fill="url(#land)"
      d="M390 388 L408 372 L426 376 L432 392 L420 406 L400 404 Z"
      opacity="0.95"
    />
    <path
      fill="url(#land)"
      d="M654 602 L680 610 L694 632 L686 652 L662 658 L646 642 L644 622 Z"
      opacity="0.95"
    />
    <path
      fill="url(#land)"
