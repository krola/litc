<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Europe coverage map</title>
  <desc id="desc">Modern stylized network map of Europe with LitC logistics routes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f9fd" />
      <stop offset="100%" stop-color="#eaf2f9" />
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce9f5" />
      <stop offset="100%" stop-color="#c9dced" />
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff" />
      <stop offset="100%" stop-color="#edf4fb" />
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6f96" />
      <stop offset="100%" stop-color="#5bbd2f" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e4f78" flood-opacity="0.15" />
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#5bbd2f" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="760" rx="34" fill="url(#bg)" />
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="url(#sea)" />

