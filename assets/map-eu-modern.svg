  <rect x="74" y="74" width="430" height="86" rx="16" fill="#ffffff" opacity="0.88" />
  <text x="100" y="126" fill="#1e4f78" font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="33" font-weight="800">
    Obszar dzialania EU
