      opacity="0.95"
    />
    <path
      fill="url(#land)"
      d="M196 262 L222 246 L254 246 L278 258 L284 278 L274 296 L248 304 L220 300 L198 284 Z"
      opacity="0.95"
    />
    <path
      fill="url(#land)"
